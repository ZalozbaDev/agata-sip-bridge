[general]
static=yes
writeprotect=no
clearglobalvars=no

[default]
exten => 1000,1,NoOp(Default test)
 same => n,Answer()
 same => n,Playback(hello-world)
 same => n,Hangup()

[from-fonial]
; Inbound calls from fonial trunk land here.
; We immediately pass control to ARI (Node) via Stasis.
; Node will Answer() via ARI and create a bridge + ExternalMedia.

exten => s,1,NoOp(Inbound from fonial: caller=${CALLERID(all)} did=${EXTEN})
 same => n,Stasis(sipws,inbound)
 same => n,Hangup()

; Fallback for DID-based routing
exten => _X.,1,Goto(from-fonial,s,1)
