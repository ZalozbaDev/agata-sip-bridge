; Local PJSIP test endpoint (no trunk)
; This file is used when FONIAL_* env vars are not set.

[global]
type=global

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[1001]
type=endpoint
context=from-fonial
transport=transport-udp
disallow=all
allow=ulaw,alaw
auth=1001
aors=1001

[1001]
type=auth
auth_type=userpass
username=1001
password=1001

[1001]
type=aor
max_contacts=1
