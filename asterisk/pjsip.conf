; NOTE: For Docker, this project renders pjsip.conf from a template (see asterisk/conf/pjsip.conf.template)
; For native installs, replace placeholders below manually.

[global]
type=global

[transport-udp]
type=transport
protocol=udp
bind=0.0.0.0:5060

[fonial-aor]
type=aor
contact=sip:SIP_REGISTRAR_HERE

[fonial-auth]
type=auth
auth_type=userpass
username=FONIAL_USER_HERE
password=FONIAL_PASS_HERE

[fonial-endpoint]
type=endpoint
transport=transport-udp
context=from-fonial
disallow=all
allow=alaw,ulaw
outbound_auth=fonial-auth
aors=fonial-aor
from_domain=FONIAL_DOMAIN_HERE

force_rport=yes
rewrite_contact=yes
rtp_symmetric=yes

[fonial-reg]
type=registration
outbound_auth=fonial-auth
server_uri=sip:SIP_REGISTRAR_HERE
client_uri=sip:FONIAL_USER_HERE@FONIAL_DOMAIN_HERE
retry_interval=60
forbidden_retry_interval=600
expiration=3600
